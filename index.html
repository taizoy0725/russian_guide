<body class="lang-page">
  <main class="language-selector">
    <p class="eyebrow">RUSSIAN GUIDE IN JAPAN</p>
    <h1>ロシア語ガイド レーナ</h1>
    <p class="lead">言語を選択してください。</p>

    <div class="lang-buttons">
      <a class="lang-button primary" href="ja/">日本語サイトへ</a>
      <a class="lang-button" href="ru/">Русский сайт</a>
    </div>
  </main>
  <script>
    const language = (navigator.languages && navigator.languages[0]) || navigator.language || "";
    if (language.toLowerCase().startsWith("ru")) {
      window.location.replace("ru/");
    } else if (language.toLowerCase().startsWith("ja")) {
      window.location.replace("ja/");
    }
  </script>
</body>
