      <h1>Галерея Окинавы</h1>
      <p>Южное море, история и островные пейзажи Окинавы.</p>
      <div class="photo-grid">
        <figure class="photo-card"><h3 class="photo-title">Район замка Сюри</h3><img src="../../assets/images/destinations/okinawa/1.jpg?v=20260606c1" alt="Виды Окинавы"><figcaption class="photo-desc">Одно из ключевых мест для знакомства с историей и культурой Рюкю.</figcaption></figure>
        <figure class="photo-card"><h3 class="photo-title">Исторические виды Нахи</h3><img src="../../assets/images/destinations/okinawa/2.jpg?v=20260606c2" alt="Историческая Окинава"><figcaption class="photo-desc">Традиционная архитектура и прогулочные зоны в центре островной столицы.</figcaption></figure>
        <figure class="photo-card"><h3 class="photo-title">Остров Окинава с высоты</h3><img src="../../assets/images/destinations/okinawa/3.jpg?v=20260606c3" alt="Побережье Окинавы"><figcaption class="photo-desc">Пейзаж, где хорошо видны форма острова и простор моря.</figcaption></figure>
        <figure class="photo-card"><h3 class="photo-title">Миякодзима с воздуха</h3><img src="../../assets/images/destinations/okinawa/4.jpg?v=20260606c4" alt="Островной пейзаж Окинавы"><figcaption class="photo-desc">Прозрачная вода и рельеф южных островов создают особенно яркое впечатление.</figcaption></figure>
