      <h1>Галерея Киото</h1>
      <p>Храмы, святилища и пейзажи древней столицы.</p>
      <div class="photo-grid">
        <figure class="photo-card"><h3 class="photo-title">Вид у Киёмидзу-дэра</h3><img src="../../assets/images/destinations/kyoto/1.jpg" alt="Храм в Киото"><figcaption class="photo-desc">Один из классических пейзажей Киото, особенно красивый в сезон цветения и осенних листьев.</figcaption></figure>
        <figure class="photo-card"><h3 class="photo-title">Фусими Инари</h3><img src="../../assets/images/destinations/kyoto/2.jpg" alt="Фусими Инари"><figcaption class="photo-desc">Святилище с яркими воротами тории и атмосферной прогулочной дорогой.</figcaption></figure>
        <figure class="photo-card"><h3 class="photo-title">Район Киёмидзу-дэра</h3><img src="../../assets/images/destinations/kyoto/3.jpg" alt="Старый район Киото"><figcaption class="photo-desc">Место, где храмовая архитектура сочетается со старинными улочками и небольшими лавками.</figcaption></figure>
        <figure class="photo-card"><h3 class="photo-title">Кинкакудзи</h3><img src="../../assets/images/destinations/kyoto/4.jpg" alt="Кинкакудзи"><figcaption class="photo-desc">Золотой павильон у пруда - один из самых узнаваемых маршрутов Киото.</figcaption></figure>
