      <h1>Галерея Токио</h1>
      <p>Виды города и знаковые места Токио.</p>
      <div class="photo-grid">
        <figure class="photo-card"><h3 class="photo-title">Набережные районы Токио</h3><img src="../../assets/images/destinations/tokyo/1.jpg" alt="Городской пейзаж Токио"><figcaption class="photo-desc">Пейзаж с небоскребами помогает почувствовать масштаб современной столицы.</figcaption></figure>

        <figure class="photo-card"><h3 class="photo-title">Городская атмосфера Сибуи</h3><img src="../../assets/images/destinations/tokyo/4.jpg" alt="Ночной Токио"><figcaption class="photo-desc">Район современной культуры, моды и яркой городской энергии.</figcaption></figure>
