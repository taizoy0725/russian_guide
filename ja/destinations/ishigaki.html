<body>

  <main>
    <section class="section reveal">
      <h1>石垣島ギャラリー</h1>
      <p>海の青さと島の景観を中心に、石垣島エリアの魅力を紹介します。</p>
      <p><a class="cta" href="https://taizoy0725.github.io/ishigaki/ja/" target="_blank" rel="noopener noreferrer">オプショナルツアーを見る</a></p>
      <div class="photo-grid">
        <figure class="photo-card"><h3 class="photo-title">石垣島の全景</h3><img src="../../assets/images/destinations/ishigaki/1.jpg" alt="石垣島の風景"><figcaption class="photo-desc">島全体の地形と海の広がりを感じられる俯瞰的な景観です。</figcaption></figure>
        <figure class="photo-card"><h3 class="photo-title">石垣市街の景観</h3><img src="../../assets/images/destinations/ishigaki/2.jpg" alt="石垣島の街並み"><figcaption class="photo-desc">港町らしい雰囲気があり、離島観光の拠点として便利なエリアです。</figcaption></figure>
        <figure class="photo-card"><h3 class="photo-title">川平湾</h3><img src="../../assets/images/destinations/ishigaki/3.jpg" alt="川平湾"><figcaption class="photo-desc">石垣島を代表する名所で、透明度の高い海が魅力です。</figcaption></figure>
        <figure class="photo-card"><h3 class="photo-title">八重山周辺の風景</h3><img src="../../assets/images/destinations/ishigaki/4.jpg" alt="石垣周辺の景観"><figcaption class="photo-desc">島ならではののどかな景観を楽しめる、ゆったりした観光エリアです。</figcaption></figure>
      </div>
