      <h1>東京ギャラリー</h1>
      <p>東京の街並みと代表スポットのイメージです。</p>
      <div class="photo-grid">
        <figure class="photo-card"><h3 class="photo-title">東京湾岸の街並み</h3><img src="../../assets/images/destinations/tokyo/1.jpg" alt="東京の街並み"><figcaption class="photo-desc">高層ビル群が連なる東京の都市スケールを感じられる景観です。</figcaption></figure>
        <figure class="photo-card"><h3 class="photo-title">浅草寺</h3><img src="../../assets/images/destinations/tokyo/2.jpg" alt="浅草寺"><figcaption class="photo-desc">歴史ある下町エリアで、伝統文化と参道散策を楽しめます。</figcaption></figure>

        <figure class="photo-card"><h3 class="photo-title">渋谷の都市景観</h3><img src="../../assets/images/destinations/tokyo/4.jpg" alt="東京の夜景"><figcaption class="photo-desc">最新カルチャーが集まるエリアの活気ある雰囲気を体感できます。</figcaption></figure>
