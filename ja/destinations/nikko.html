  <main>
    <section class="section reveal">
      <h1>日光ギャラリー</h1>
      <p>世界遺産の社寺と自然景観を中心に、日光の魅力を紹介します。</p>
      <div class="photo-grid">
        <figure class="photo-card"><h3 class="photo-title">日光の社寺景観</h3><img src="../../assets/images/destinations/nikko/1.jpg" alt="日光市の風景"><figcaption class="photo-desc">山あいに広がる歴史ある社寺エリアの雰囲気を楽しめます。</figcaption></figure>
        <figure class="photo-card"><h3 class="photo-title">日光東照宮 陽明門</h3><img src="../../assets/images/destinations/nikko/2.jpg" alt="日光東照宮"><figcaption class="photo-desc">日光観光の中心となる世界遺産で、彫刻の美しさが見どころです。</figcaption></figure>
        <figure class="photo-card"><h3 class="photo-title">華厳滝</h3><img src="../../assets/images/destinations/nikko/3.jpg" alt="華厳滝"><figcaption class="photo-desc">迫力ある滝の景観が魅力で、四季ごとに異なる表情を見せます。</figcaption></figure>
        <figure class="photo-card"><h3 class="photo-title">中禅寺湖</h3><img src="../../assets/images/destinations/nikko/4.jpg" alt="中禅寺湖"><figcaption class="photo-desc">湖畔ドライブや遊覧と合わせて自然を満喫できるエリアです。</figcaption></figure>
      </div>
      <ul class="credit-list">

      </ul>
    </section>
