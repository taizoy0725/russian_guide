<body>
  <a class="back-link" href="../#destinations">← 各地のご案内へ戻る</a>
  <main>
    <section class="section reveal">
      <h1>猪苗代湖ギャラリー</h1>
      <p>湖の景観と裏磐梯・磐梯山、会津エリアの歴史風景をまとめています。</p>
      <div class="photo-grid">
        <figure class="photo-card"><h3 class="photo-title">猪苗代湖</h3><img src="../../assets/images/destinations/inawashiro/1.jpg" alt="猪苗代湖"><figcaption class="photo-desc">広い湖面と周囲の山並みが魅力の、福島を代表する景勝地です。</figcaption></figure>
        <figure class="photo-card"><h3 class="photo-title">磐梯山</h3><img src="../../assets/images/destinations/inawashiro/2.jpg" alt="磐梯山"><figcaption class="photo-desc">四季折々の自然を感じられる山岳景観が人気です。</figcaption></figure>
        <figure class="photo-card"><h3 class="photo-title">会津若松城下の景観</h3><img src="../../assets/images/destinations/inawashiro/3.jpg" alt="会津若松の景観"><figcaption class="photo-desc">歴史ある会津エリアの街並みと文化を感じることができます。</figcaption></figure>
        <figure class="photo-card"><h3 class="photo-title">裏磐梯の自然</h3><img src="../../assets/images/destinations/inawashiro/4.jpg" alt="裏磐梯の風景"><figcaption class="photo-desc">湖沼群と山景が広がる裏磐梯は、自然散策に最適なエリアです。</figcaption></figure>
      </div>
      <ul class="credit-list">

      </ul>
    </section>
