<body>
  <a class="back-link" href="../#destinations">← 各地のご案内へ戻る</a>
  <main>
    <section class="section reveal">
      <h1>沖縄ギャラリー</h1>
      <p>南国の海と歴史スポットを中心に、沖縄の魅力を感じられる写真です。</p>
      <div class="photo-grid">
        <figure class="photo-card"><h3 class="photo-title">首里城エリア</h3><img src="../../assets/images/destinations/okinawa/1.jpg" alt="沖縄の景観"><figcaption class="photo-desc">沖縄の歴史文化を感じられる代表的な観光エリアです。</figcaption></figure>
        <figure class="photo-card"><h3 class="photo-title">那覇の歴史景観</h3><img src="../../assets/images/destinations/okinawa/2.jpg" alt="沖縄の海"><figcaption class="photo-desc">伝統的な建築と周辺散策をあわせて楽しめるスポットです。</figcaption></figure>
        <figure class="photo-card"><h3 class="photo-title">那覇市街の眺め</h3><img src="../../assets/images/destinations/okinawa/3.jpg" alt="沖縄の海岸"><figcaption class="photo-desc">都市部の雰囲気と沖縄らしい街並みを一度に味わえます。</figcaption></figure>
        <figure class="photo-card"><h3 class="photo-title">八重山周辺の景観</h3><img src="../../assets/images/destinations/okinawa/4.jpg" alt="沖縄の風景"><figcaption class="photo-desc">本島とは異なる離島エリアの自然風景も人気があります。</figcaption></figure>
      </div>
      <ul class="credit-list">

      </ul>
    </section>
