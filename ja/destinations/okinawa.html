<body>
  <a class="back-link" href="../#destinations">← 各地のご案内へ戻る</a>
  <main>
    <section class="section reveal">
      <h1>沖縄ギャラリー</h1>
      <p>南国の海と歴史スポットを中心に、沖縄の魅力を感じられる写真です。</p>
      <div class="photo-grid">
        <figure class="photo-card"><h3 class="photo-title">首里城エリア</h3><img src="../../assets/images/destinations/okinawa/1.jpg?v=20260606c1" alt="沖縄の景観"><figcaption class="photo-desc">沖縄の歴史文化を感じられる代表的な観光エリアです。</figcaption></figure>
        <figure class="photo-card"><h3 class="photo-title">那覇の歴史景観</h3><img src="../../assets/images/destinations/okinawa/2.jpg?v=20260606c2" alt="沖縄の海"><figcaption class="photo-desc">伝統的な建築と周辺散策をあわせて楽しめるスポットです。</figcaption></figure>
        <figure class="photo-card"><h3 class="photo-title">沖縄本島の俯瞰景観</h3><img src="../../assets/images/destinations/okinawa/3.jpg?v=20260606c3" alt="沖縄の海岸"><figcaption class="photo-desc">本島全体の地形と海の広がりを俯瞰で感じられる景観です。</figcaption></figure>
        <figure class="photo-card"><h3 class="photo-title">宮古島の空撮景観</h3><img src="../../assets/images/destinations/okinawa/4.jpg?v=20260606c4" alt="沖縄の風景"><figcaption class="photo-desc">透明度の高い海と島の地形が印象的な、南西諸島らしい風景です。</figcaption></figure>
      </div>
      <ul class="credit-list">
        <li>画像出典: Wikimedia Commons</li>
      </ul>
    </section>
  </main>
