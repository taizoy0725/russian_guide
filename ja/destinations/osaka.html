      <h1>大阪ギャラリー</h1>
      <p>大阪の都市景観、城、繁華街の雰囲気をまとめています。</p>
      <div class="photo-grid">
        <figure class="photo-card"><h3 class="photo-title">梅田周辺のスカイライン</h3><img src="../../assets/images/destinations/osaka/1.jpg" alt="大阪の街並み"><figcaption class="photo-desc">都市のダイナミックな景観が広がる大阪中心部の眺めです。</figcaption></figure>
        <figure class="photo-card"><h3 class="photo-title">大阪城</h3><img src="../../assets/images/destinations/osaka/2.jpg" alt="大阪城"><figcaption class="photo-desc">歴史と観光が融合した大阪の象徴的スポットです。</figcaption></figure>
        <figure class="photo-card"><h3 class="photo-title">道頓堀</h3><img src="../../assets/images/destinations/osaka/3.jpg" alt="道頓堀"><figcaption class="photo-desc">グルメとネオンが集まる、活気ある繁華街エリアです。</figcaption></figure>
        <figure class="photo-card"><h3 class="photo-title">梅田スカイビル</h3><img src="../../assets/images/destinations/osaka/4.jpg" alt="大阪の都市風景"><figcaption class="photo-desc">近未来的な建築が印象的な、大阪北エリアの人気スポットです。</figcaption></figure>
      </div>
