    <section class="section reveal">
      <h1>箱根ギャラリー</h1>
      <p>芦ノ湖、山景、温泉地周辺の自然を感じられる写真です。</p>
      <div class="photo-grid">
        <figure class="photo-card"><h3 class="photo-title">芦ノ湖と富士山の眺望</h3><img src="../../assets/images/destinations/hakone/1.jpg" alt="箱根の風景"><figcaption class="photo-desc">箱根を象徴する湖畔景観で、天候が良い日は富士山を望めます。</figcaption></figure>
        <figure class="photo-card"><h3 class="photo-title">大涌谷</h3><img src="../../assets/images/destinations/hakone/2.jpg" alt="大涌谷"><figcaption class="photo-desc">火山地形を体感できるダイナミックな自然スポットです。</figcaption></figure>
        <figure class="photo-card"><h3 class="photo-title">箱根神社</h3><img src="../../assets/images/destinations/hakone/3.jpg" alt="箱根神社"><figcaption class="photo-desc">湖畔の神社として人気が高く、写真映えする鳥居が見どころです。</figcaption></figure>
        <figure class="photo-card"><h3 class="photo-title">元箱根の湖畔風景</h3><img src="../../assets/images/destinations/hakone/4.jpg" alt="芦ノ湖の景観"><figcaption class="photo-desc">遊覧船や周辺散策と組み合わせて楽しめる落ち着いた景観です。</figcaption></figure>
      </div>
