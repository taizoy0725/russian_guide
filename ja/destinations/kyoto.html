    <section class="section reveal">
      <h1>京都ギャラリー</h1>
      <p>神社仏閣と古都景観を中心とした京都のイメージです。</p>
      <div class="photo-grid">
        <figure class="photo-card"><h3 class="photo-title">清水寺の眺望</h3><img src="../../assets/images/destinations/kyoto/1.jpg" alt="京都の寺院"><figcaption class="photo-desc">京都の代表的な寺院景観で、季節ごとの表情が楽しめます。</figcaption></figure>
        <figure class="photo-card"><h3 class="photo-title">伏見稲荷大社</h3><img src="../../assets/images/destinations/kyoto/2.jpg" alt="京都の街並み"><figcaption class="photo-desc">朱色の社殿と参道が印象的な、京都屈指の人気スポットです。</figcaption></figure>
        <figure class="photo-card"><h3 class="photo-title">清水寺エリア</h3><img src="../../assets/images/destinations/kyoto/3.jpg" alt="伏見稲荷大社"><figcaption class="photo-desc">歴史ある建築と周辺の町並みを合わせて散策できるエリアです。</figcaption></figure>
        <figure class="photo-card"><h3 class="photo-title">金閣寺</h3><img src="../../assets/images/destinations/kyoto/4.jpg" alt="京都の観光スポット"><figcaption class="photo-desc">池泉庭園に映える金閣の景観は、京都らしさを感じる定番コースです。</figcaption></figure>
      </div>
      <ul class="credit-list">
        <li>画像出典: Wikimedia Commons</li>
      </ul>
