      <p>歴史ある寺社と海沿いの落ち着いた景観を紹介します。</p>
      <div class="photo-grid">
        <figure class="photo-card"><h3 class="photo-title">鎌倉中心部の景観</h3><img src="../../assets/images/destinations/kamakura/1.jpg" alt="鎌倉の景観"><figcaption class="photo-desc">古都らしい落ち着いた街並みと寺社エリアの雰囲気が魅力です。</figcaption></figure>

        <figure class="photo-card"><h3 class="photo-title">長谷寺エリア</h3><img src="../../assets/images/destinations/kamakura/4.jpg" alt="鎌倉の寺院"><figcaption class="photo-desc">寺院巡りと海側散策を組み合わせたコースに適したロケーションです。</figcaption></figure>
