      <h1>鎌倉ギャラリー</h1>
      <p>歴史ある寺社と海沿いの落ち着いた景観を紹介します。</p>
      <div class="photo-grid">
        <figure class="photo-card"><h3 class="photo-title">鶴岡八幡宮周辺</h3><img src="../../assets/images/destinations/kamakura/1.jpg" alt="鎌倉の景観"><figcaption class="photo-desc">鎌倉の象徴的な参道と社殿が広がる、歴史散策の中心エリアです。</figcaption></figure>
        <figure class="photo-card"><h3 class="photo-title">鶴岡八幡宮</h3><img src="../../assets/images/destinations/kamakura/2.jpg" alt="鶴岡八幡宮"><figcaption class="photo-desc">鎌倉を代表する神社で、季節の参道散策にも人気があります。</figcaption></figure>
        <figure class="photo-card"><h3 class="photo-title">建長寺</h3><img src="../../assets/images/destinations/kamakura/3.jpg" alt="鎌倉大仏"><figcaption class="photo-desc">禅宗寺院の代表格で、静かな境内と山門の景観が見どころです。</figcaption></figure>
        <figure class="photo-card"><h3 class="photo-title">江の島遠景</h3><img src="../../assets/images/destinations/kamakura/4.jpg" alt="鎌倉の寺院"><figcaption class="photo-desc">海沿いエリアの開放感を感じられる、鎌倉周辺観光と相性の良い景観です。</figcaption></figure>
      </div>
